<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEADLINE — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --border: #e2e8f8;
    --text: #1e1b4b;
    --muted: #94a3b8;

    --pink:   #ff6b9d;
    --pink-bg: #fff0f6;
    --violet: #8b5cf6;
    --violet-bg: #f3f0ff;
    --blue:   #3b82f6;
    --blue-bg: #eff6ff;
    --teal:   #06b6d4;
    --teal-bg: #f0fdff;
    --green:  #22c55e;
    --green-bg: #f0fdf4;
    --orange: #f97316;
    --orange-bg: #fff7ed;
    --red:    #ef4444;
    --red-bg: #fef2f2;
    --yellow: #eab308;
    --yellow-bg: #fefce8;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    background: #fff;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(100,80,255,0.07);
    animation: slideDown 0.5s ease;
  }

  @keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .logo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 24px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--violet), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--violet), var(--pink));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .clock {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    background: var(--bg);
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--violet), var(--pink));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 10px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(139,92,246,0.3);
    white-space: nowrap;
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,92,246,0.4); }
  .btn-primary:active { transform: scale(0.97); }

  /* CONTAINER */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 40px 80px;
  }

  /* STATS */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  @keyframes fadeUp {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .stat {
    background: #fff;
    border-radius: 18px;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 2px solid transparent;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    transition: transform 0.2s;
    position: relative;
    overflow: hidden;
  }

  .stat::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    border-radius: 0 0 0 80px;
    opacity: 0.12;
  }

  .stat:hover { transform: translateY(-3px); }

  .stat-1 { border-color: #e0d9ff; }
  .stat-1::before { background: var(--violet); }
  .stat-2 { border-color: #ffd6e6; }
  .stat-2::before { background: var(--red); }
  .stat-3 { border-color: #ffe8c8; }
  .stat-3::before { background: var(--orange); }
  .stat-4 { border-color: #c8f0da; }
  .stat-4::before { background: var(--green); }

  .stat-icon { font-size: 22px; }

  .stat-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-value {
    font-family: 'Nunito', sans-serif;
    font-size: 40px;
    font-weight: 900;
    line-height: 1;
  }

  .stat-1 .stat-value { color: var(--violet); }
  .stat-2 .stat-value { color: var(--red); }
  .stat-3 .stat-value { color: var(--orange); }
  .stat-4 .stat-value { color: var(--green); }

  /* ADD FORM */
  .add-section {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 28px;
    border: 2px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .section-title {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .add-form {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
  }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--violet);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
    background: #fff;
  }

  input::placeholder { color: var(--muted); font-weight: 400; }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .filter-btn {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--violet); color: var(--violet); background: var(--violet-bg); }

  .filter-btn.active {
    background: linear-gradient(135deg, var(--violet), var(--pink));
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 12px rgba(139,92,246,0.25);
  }

  /* CARD LIST */
  .deadlines-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.6s ease 0.4s both;
  }

  /* COLOR PALETTES PER CARD — cycle through */
  .deadline-card {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 18px 22px 18px 20px;
    display: grid;
    grid-template-columns: 6px auto 1fr auto auto auto auto;
    align-items: center;
    gap: 16px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.35s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  @keyframes cardIn {
    from { transform: translateX(-10px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .deadline-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .deadline-card.done { opacity: 0.55; }

  /* Colored left stripe */
  .card-stripe {
    width: 6px;
    border-radius: 4px;
    align-self: stretch;
    flex-shrink: 0;
  }

  /* Card color themes */
  .cc-violet .card-stripe { background: linear-gradient(180deg, #8b5cf6, #a78bfa); }
  .cc-violet { border-color: #ede9fe; background: #faf8ff; }
  .cc-violet .countdown-value { color: var(--violet); }

  .cc-pink .card-stripe { background: linear-gradient(180deg, #ff6b9d, #f9a8d4); }
  .cc-pink { border-color: #fce7f3; background: #fff8fc; }
  .cc-pink .countdown-value { color: var(--pink); }

  .cc-blue .card-stripe { background: linear-gradient(180deg, #3b82f6, #93c5fd); }
  .cc-blue { border-color: #dbeafe; background: #f8fbff; }
  .cc-blue .countdown-value { color: var(--blue); }

  .cc-teal .card-stripe { background: linear-gradient(180deg, #06b6d4, #67e8f9); }
  .cc-teal { border-color: #cffafe; background: #f0fdff; }
  .cc-teal .countdown-value { color: var(--teal); }

  .cc-orange .card-stripe { background: linear-gradient(180deg, #f97316, #fdba74); }
  .cc-orange { border-color: #fed7aa; background: #fff9f5; }
  .cc-orange .countdown-value { color: var(--orange); }

  .cc-green .card-stripe { background: linear-gradient(180deg, #22c55e, #86efac); }
  .cc-green { border-color: #bbf7d0; background: #f7fff9; }
  .cc-green .countdown-value { color: var(--green); }

  /* Urgent / Warn override */
  .deadline-card.urgent { border-color: #fecaca !important; background: #fff8f8 !important; }
  .deadline-card.urgent .card-stripe { background: linear-gradient(180deg, #ef4444, #fca5a5) !important; }
  .deadline-card.urgent .countdown-value { color: var(--red) !important; }

  .deadline-card.warn { border-color: #fde68a !important; background: #fffdf0 !important; }
  .deadline-card.warn .card-stripe { background: linear-gradient(180deg, #eab308, #fde047) !important; }
  .deadline-card.warn .countdown-value { color: var(--yellow) !important; }

  /* CHECK */
  .card-check {
    width: 24px; height: 24px;
    border: 2.5px solid #d1d5db;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 12px;
    color: transparent;
    background: #fff;
  }

  .card-check:hover { border-color: var(--violet); color: var(--violet); transform: scale(1.1); }
  .deadline-card.done .card-check { background: var(--green); border-color: var(--green); color: white; }

  /* CARD CONTENT */
  .card-info { min-width: 0; }

  .card-title {
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .deadline-card.done .card-title { text-decoration: line-through; color: var(--muted); }

  .card-note {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 380px;
    font-weight: 500;
  }

  /* COUNTDOWN */
  .card-countdown { text-align: right; flex-shrink: 0; }

  .countdown-value {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 900;
    line-height: 1;
  }

  .countdown-value.done-label {
    color: var(--green) !important;
    font-size: 15px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
  }

  .countdown-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* DATE */
  .card-date {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
    line-height: 1.6;
    white-space: nowrap;
  }

  /* DELETE & EDIT */
  .card-delete, .card-edit {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .card-delete { color: #d1d5db; }
  .card-delete:hover { color: var(--red); background: var(--red-bg); }

  .card-edit { color: #d1d5db; }
  .card-edit:hover { color: var(--violet); background: var(--violet-bg); }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 70px 40px;
    animation: fadeUp 0.5s ease;
  }

  .empty-icon { font-size: 64px; margin-bottom: 16px; }

  .empty-text {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--muted);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(30,27,75,0.35);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: #fff;
    border-radius: 24px;
    padding: 32px;
    width: 460px;
    max-width: 90vw;
    box-shadow: 0 30px 80px rgba(100,80,255,0.18);
    animation: modalIn 0.25s ease;
    border: 2px solid var(--border);
  }

  @keyframes modalIn {
    from { transform: scale(0.95) translateY(12px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 24px;
    background: linear-gradient(135deg, var(--violet), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .form-grid { display: grid; gap: 16px; }

  .form-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

  .btn-cancel {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .hidden { display: none !important; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 3px; }

  @media (max-width: 768px) {
    header { padding: 16px 20px; }
    .container { padding: 20px 16px 60px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .add-form { grid-template-columns: 1fr; }
    .deadline-card { grid-template-columns: 5px auto 1fr auto auto auto; gap: 10px; }
    .card-date { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⏰</div>
    DEADLINE
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--:--</div>
    <button class="btn-primary" onclick="openModal()">+ Thêm mới</button>
  </div>
</header>

<div class="container">

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat stat-1">
      <div class="stat-icon">📋</div>
      <div class="stat-label">Tổng cộng</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat stat-2">
      <div class="stat-icon">🔥</div>
      <div class="stat-label">Khẩn cấp</div>
      <div class="stat-value" id="stat-urgent">0</div>
    </div>
    <div class="stat stat-3">
      <div class="stat-icon">⚡</div>
      <div class="stat-label">Sắp đến</div>
      <div class="stat-value" id="stat-soon">0</div>
    </div>
    <div class="stat stat-4">
      <div class="stat-icon">✅</div>
      <div class="stat-label">Hoàn thành</div>
      <div class="stat-value" id="stat-done">0</div>
    </div>
  </div>

  <!-- ADD FORM -->
  <div class="add-section">
    <div class="section-title">✏️ Thêm nhanh</div>
    <div class="add-form">
      <input type="text" id="quick-title" placeholder="Tên deadline của bạn..." onkeydown="if(event.key==='Enter') quickAdd()">
      <input type="datetime-local" id="quick-date" style="width:auto">
      <button class="btn-primary" onclick="quickAdd()">Thêm →</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">🗂 Tất cả</button>
    <button class="filter-btn" onclick="setFilter('urgent', this)">🔥 Khẩn cấp</button>
    <button class="filter-btn" onclick="setFilter('soon', this)">⚡ Sắp đến</button>
    <button class="filter-btn" onclick="setFilter('ok', this)">🌿 Còn thời gian</button>
    <button class="filter-btn" onclick="setFilter('done', this)">✅ Hoàn thành</button>
  </div>

  <!-- LIST -->
  <div class="deadlines-list" id="deadlines-list"></div>

</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">🎯 Thêm Deadline Mới</div>
    <div class="form-grid">
      <div>
        <div class="form-label">Tên deadline *</div>
        <input type="text" id="m-title" placeholder="Ví dụ: Nộp báo cáo tháng 3...">
      </div>
      <div>
        <div class="form-label">Ngày & giờ *</div>
        <input type="datetime-local" id="m-date">
      </div>
      <div>
        <div class="form-label">Ghi chú</div>
        <textarea id="m-note" placeholder="Mô tả thêm..." rows="3" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
      <button class="btn-primary" onclick="addFromModal()">Thêm Deadline 🚀</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <div class="modal-title">✏️ Chỉnh Sửa Deadline</div>
    <div class="form-grid">
      <div>
        <div class="form-label">Tên deadline *</div>
        <input type="text" id="e-title" placeholder="Ví dụ: Nộp báo cáo tháng 3...">
      </div>
      <div>
        <div class="form-label">Ngày & giờ *</div>
        <input type="datetime-local" id="e-date">
      </div>
      <div>
        <div class="form-label">Ghi chú</div>
        <textarea id="e-note" placeholder="Mô tả thêm..." rows="3" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Huỷ</button>
      <button class="btn-primary" onclick="saveEdit()">Lưu thay đổi 💾</button>
    </div>
  </div>
</div>

<script>
  let editingId = null;

  function openEditModal(id) {
    const d = deadlines.find(x => x.id === id);
    if (!d) return;
    editingId = id;
    document.getElementById('e-title').value = d.title;
    document.getElementById('e-note').value = d.note || '';
    const dt = new Date(d.date);
    const iso = new Date(dt.getTime() - dt.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    document.getElementById('e-date').value = iso;
    document.getElementById('edit-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('e-title').focus(), 50);
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.add('hidden');
    editingId = null;
  }

  function saveEdit() {
    const title = document.getElementById('e-title').value.trim();
    const date = document.getElementById('e-date').value;
    const note = document.getElementById('e-note').value.trim();
    if (!title || !date) { alert('Vui lòng nhập tên và ngày!'); return; }
    const d = deadlines.find(x => x.id === editingId);
    if (d) {
      d.title = title;
      d.date = new Date(date).getTime();
      d.note = note;
      save(); render();
    }
    closeEditModal();
  }

  const COLORS = ['cc-violet', 'cc-pink', 'cc-blue', 'cc-teal', 'cc-orange', 'cc-green'];

  let deadlines = JSON.parse(localStorage.getItem('deadlines_v4') || '[]');
  let currentFilter = 'all';

  if (deadlines.length === 0) {
    const now = Date.now();
    deadlines = [
      { id: 1, title: 'Nộp báo cáo tháng 3', date: now + 2 * 86400000, note: 'Gửi cho trưởng phòng trước 17:00', done: false, color: 0 },
      { id: 2, title: 'Ôn thi cuối kỳ môn Toán', date: now + 5 * 86400000, note: '', done: false, color: 1 },
      { id: 3, title: 'Họp nhóm dự án Alpha', date: now + 18 * 3600000, note: 'Zoom link: meet.google.com/...', done: false, color: 2 },
      { id: 4, title: 'Đặt vé máy bay Đà Nẵng', date: now + 15 * 86400000, note: 'Chuyến bay tháng 4', done: true, color: 3 },
      { id: 5, title: 'Review Pull Request #42', date: now + 3 * 3600000, note: 'Feature: user authentication', done: false, color: 4 },
    ];
    save();
  }

  function save() { localStorage.setItem('deadlines_v4', JSON.stringify(deadlines)); }

  function updateClock() {
    document.getElementById('clock').textContent = new Date().toTimeString().slice(0, 8);
  }
  setInterval(updateClock, 1000); updateClock();

  function getUrgency(ms) {
    if (ms <= 0) return 'urgent';
    if (ms < 24 * 3600000) return 'urgent';
    if (ms < 3 * 86400000) return 'warn';
    return 'ok';
  }

  function formatCountdown(ms) {
    if (ms <= 0) return { value: 'QUÁ HẠN', label: '⚠️ đã trễ', cls: '' };
    const h = Math.floor(ms / 3600000);
    const d = Math.floor(ms / 86400000);
    if (h < 24) return { value: h + 'h', label: ms < 3600000 ? Math.floor((ms % 3600000) / 60000) + 'm còn lại' : 'còn lại hôm nay', cls: '' };
    if (d < 3) return { value: d + 'n', label: 'ngày còn lại', cls: '' };
    return { value: d + 'n', label: 'ngày còn lại', cls: '' };
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' })
      + '<br>' + d.toTimeString().slice(0, 5);
  }

  let colorCounter = 0;

  function render() {
    const list = document.getElementById('deadlines-list');
    const now = Date.now();

    let filtered = deadlines.filter(d => {
      if (currentFilter === 'all') return true;
      if (currentFilter === 'done') return d.done;
      if (currentFilter === 'urgent') return !d.done && getUrgency(d.date - now) === 'urgent';
      if (currentFilter === 'soon') return !d.done && getUrgency(d.date - now) === 'warn';
      if (currentFilter === 'ok') return !d.done && getUrgency(d.date - now) === 'ok';
      return false;
    });

    filtered.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return a.date - b.date;
    });

    const total = deadlines.filter(d => !d.done).length;
    const urgent = deadlines.filter(d => !d.done && getUrgency(d.date - now) === 'urgent').length;
    const soon = deadlines.filter(d => !d.done && getUrgency(d.date - now) === 'warn').length;
    const done = deadlines.filter(d => d.done).length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-urgent').textContent = urgent;
    document.getElementById('stat-soon').textContent = soon;
    document.getElementById('stat-done').textContent = done;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🎉</div>
        <div class="empty-text">Không có deadline nào — thảnh thơi rồi!</div>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(d => {
      const ms = d.date - now;
      const urgency = d.done ? 'done' : getUrgency(ms);
      const colorClass = urgency === 'urgent' || urgency === 'warn' ? '' : COLORS[d.color % COLORS.length];
      const cd = d.done
        ? { value: '✓ XONG', label: '', cls: 'done-label' }
        : formatCountdown(ms);

      return `<div class="deadline-card ${urgency} ${colorClass}">
        <div class="card-stripe"></div>
        <div class="card-check" onclick="toggleDone(${d.id})">${d.done ? '✓' : ''}</div>
        <div class="card-info">
          <div class="card-title">${escHtml(d.title)}</div>
          ${d.note ? `<div class="card-note">📝 ${escHtml(d.note)}</div>` : ''}
        </div>
        <div class="card-date">${formatDate(d.date)}</div>
        <div class="card-countdown">
          <div class="countdown-value ${cd.cls}">${cd.value}</div>
          ${cd.label ? `<div class="countdown-label">${cd.label}</div>` : ''}
        </div>
        <button class="card-edit" onclick="openEditModal(${d.id})" title="Chỉnh sửa">✏️</button>
        <button class="card-delete" onclick="deleteItem(${d.id})" title="Xoá">✕</button>
      </div>`;
    }).join('');
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function toggleDone(id) {
    const d = deadlines.find(x => x.id === id);
    if (d) { d.done = !d.done; save(); render(); }
  }

  function deleteItem(id) { deadlines = deadlines.filter(x => x.id !== id); save(); render(); }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function quickAdd() {
    const title = document.getElementById('quick-title').value.trim();
    const date = document.getElementById('quick-date').value;
    if (!title || !date) { alert('Vui lòng nhập tên và ngày!'); return; }
    deadlines.push({ id: Date.now(), title, date: new Date(date).getTime(), note: '', done: false, color: colorCounter++ });
    save(); render();
    document.getElementById('quick-title').value = '';
  }

  function openModal() {
    document.getElementById('modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('m-title').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    ['m-title', 'm-note'].forEach(id => document.getElementById(id).value = '');
  }

  function addFromModal() {
    const title = document.getElementById('m-title').value.trim();
    const date = document.getElementById('m-date').value;
    const note = document.getElementById('m-note').value.trim();
    if (!title || !date) { alert('Vui lòng nhập tên và ngày!'); return; }
    deadlines.push({ id: Date.now(), title, date: new Date(date).getTime(), note, done: false, color: colorCounter++ });
    save(); render(); closeModal();
  }

  const tmr = new Date(Date.now() + 86400000);
  tmr.setHours(23, 59, 0, 0);
  const iso = tmr.toISOString().slice(0, 16);
  document.getElementById('quick-date').value = iso;
  document.getElementById('m-date').value = iso;

  setInterval(render, 30000);
  render();
</script>
</body>
</html>
